<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="ib1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C72B0"/><stop offset="100%" stop-color="#3A5A8C"/>
    </linearGradient>
    <linearGradient id="ib2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55A868"/><stop offset="100%" stop-color="#3D8A4E"/>
    </linearGradient>
    <linearGradient id="ib3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C44E52"/><stop offset="100%" stop-color="#A03A3E"/>
    </linearGradient>
    <linearGradient id="ib4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8172B2"/><stop offset="100%" stop-color="#655899"/>
    </linearGradient>
    <linearGradient id="ib5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCB974"/><stop offset="100%" stop-color="#B0A05A"/>
    </linearGradient>
  </defs>

  <!-- 圆角方底 -->
  <rect x="4" y="4" width="120" height="120" rx="16" fill="#FAFAFA"/>

  <!-- 网格线 -->
  <line x1="18" y1="108" x2="110" y2="108" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="18" y1="88"  x2="110" y2="88"  stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="18" y1="68"  x2="110" y2="68"  stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="18" y1="48"  x2="110" y2="48"  stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>

  <!-- 柱子 -->
  <rect x="24" y="60" width="12" height="48" rx="0" fill="url(#ib1)"/>
  <rect x="42" y="40" width="12" height="68" rx="0" fill="url(#ib2)"/>
  <rect x="60" y="52" width="12" height="56" rx="0" fill="url(#ib3)"/>
  <rect x="78" y="28" width="12" height="80" rx="0" fill="url(#ib4)"/>
  <rect x="96" y="44" width="12" height="64" rx="0" fill="url(#ib5)"/>

  <!-- 轴线 -->
  <line x1="18" y1="108" x2="110" y2="108" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 折线 -->
  <polyline points="30,52 48,32 66,44 84,20 102,36"
            fill="none" stroke="#C44E52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="30" cy="52" r="3" fill="#C44E52" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="48" cy="32" r="3" fill="#C44E52" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="66" cy="44" r="3" fill="#C44E52" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="84" cy="20" r="3" fill="#C44E52" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="102" cy="36" r="3" fill="#C44E52" stroke="#FFFFFF" stroke-width="1"/>
</svg>
