  <!-- 文字 -->
  <text x="124" y="66" dominant-baseline="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="34" font-weight="700" fill="#1A1A1A" letter-spacing="1.5">AnyVis</text>
</svg>
