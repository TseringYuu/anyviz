<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- 等距柱体的三个面渐变色 -->
    <linearGradient id="top1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7AADFF"/><stop offset="100%" stop-color="#5B8DE0"/></linearGradient>
    <linearGradient id="left1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4A7ACC"/><stop offset="100%" stop-color="#3A62A3"/></linearGradient>
    <linearGradient id="right1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5B8DE0"/><stop offset="100%" stop-color="#4A7ACC"/></linearGradient>

    <linearGradient id="top2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6DCD8A"/><stop offset="100%" stop-color="#4CB880"/></linearGradient>
    <linearGradient id="left2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3DA36B"/><stop offset="100%" stop-color="#2E8A54"/></linearGradient>
    <linearGradient id="right2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CB880"/><stop offset="100%" stop-color="#3DA36B"/></linearGradient>

    <linearGradient id="top3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F5998D"/><stop offset="100%" stop-color="#EE7B6F"/></linearGradient>
    <linearGradient id="left3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D96458"/><stop offset="100%" stop-color="#C45045"/></linearGradient>
    <linearGradient id="right3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EE7B6F"/><stop offset="100%" stop-color="#D96458"/></linearGradient>

    <linearGradient id="top4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#B8A0E8"/><stop offset="100%" stop-color="#9B7ED8"/></linearGradient>
    <linearGradient id="left4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7E5FC4"/><stop offset="100%" stop-color="#6849AA"/></linearGradient>
    <linearGradient id="right4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7ED8"/><stop offset="100%" stop-color="#7E5FC4"/></linearGradient>

    <!-- 底部阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景圆角底 -->
  <rect x="36" y="36" width="328" height="328" rx="36" fill="#FAFBFC" stroke="#EDEEF0" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 网格底纹（极淡） -->
  <g opacity="0.04">
    <line x1="60" y1="200" x2="340" y2="200" stroke="#000" stroke-width="0.5"/>
    <line x1="60" y1="240" x2="340" y2="240" stroke="#000" stroke-width="0.5"/>
    <line x1="60" y1="280" x2="340" y2="280" stroke="#000" stroke-width="0.5"/>
    <line x1="60" y1="320" x2="340" y2="320" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- ═══ 等距 3D 柱体 ═══ -->
  <g transform="translate(200,220)">

    <!-- 柱 1（最矮，蓝色）-->
    <g transform="translate(-120,0)">
      <polygon points="0,-40 18,-50 50,-50 32,-40" fill="url(#top1)"/>
      <polygon points="0,-40 32,-40 32,40 0,40" fill="url(#left1)"/>
      <polygon points="32,-40 50,-50 50,-10 32,40" fill="url(#right1)"/>
    </g>

    <!-- 柱 2（中高，绿色）-->
    <g transform="translate(-44,0)">
      <polygon points="0,-80 18,-90 50,-90 32,-80" fill="url(#top2)"/>
      <polygon points="0,-80 32,-80 32,0 0,0" fill="url(#left2)"/>
      <polygon points="32,-80 50,-90 50,-10 32,0" fill="url(#right2)"/>
    </g>

    <!-- 柱 3（最高，珊瑚色）-->
    <g transform="translate(32,0)">
      <polygon points="0,-130 18,-140 50,-140 32,-130" fill="url(#top3)"/>
      <polygon points="0,-130 32,-130 32,-50 0,-50" fill="url(#left3)"/>
      <polygon points="32,-130 50,-140 50,-60 32,-50" fill="url(#right3)"/>
    </g>

    <!-- 柱 4（次高，紫色）-->
    <g transform="translate(108,0)">
      <polygon points="0,-100 18,-110 50,-110 32,-100" fill="url(#top4)"/>
      <polygon points="0,-100 32,-100 32,-20 0,-20" fill="url(#left4)"/>
      <polygon points="32,-100 50,-110 50,-30 32,-20" fill="url(#right4)"/>
    </g>

    <!-- 基底面 -->
    <polygon points="-120,40 -44,0 32,-50 108,-20 108,40 -120,40" fill="#EDEEF0" opacity="0.3"/>
  </g>

  <!-- 品牌名 -->
  <text x="200" y="375" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="30" font-weight="700" fill="#1A1A1A" letter-spacing="2">anyvis</text>
</svg>
