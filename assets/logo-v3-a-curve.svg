<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7AADFF"/><stop offset="100%" stop-color="#5B8DE0"/></linearGradient>
    <linearGradient id="l1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4A7ACC"/><stop offset="100%" stop-color="#3A62A3"/></linearGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5B8DE0"/><stop offset="100%" stop-color="#4A7ACC"/></linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6DCD8A"/><stop offset="100%" stop-color="#4CB880"/></linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3DA36B"/><stop offset="100%" stop-color="#2E8A54"/></linearGradient>
    <linearGradient id="r2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CB880"/><stop offset="100%" stop-color="#3DA36B"/></linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F5998D"/><stop offset="100%" stop-color="#EE7B6F"/></linearGradient>
    <linearGradient id="l3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D96458"/><stop offset="100%" stop-color="#C45045"/></linearGradient>
    <linearGradient id="r3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EE7B6F"/><stop offset="100%" stop-color="#D96458"/></linearGradient>
    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#B8A0E8"/><stop offset="100%" stop-color="#9B7ED8"/></linearGradient>
    <linearGradient id="l4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7E5FC4"/><stop offset="100%" stop-color="#6849AA"/></linearGradient>
    <linearGradient id="r4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7ED8"/><stop offset="100%" stop-color="#7E5FC4"/></linearGradient>

    <!-- A 字贝塞尔曲线渐变 -->
    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B8DE0" stop-opacity="0.0"/>
      <stop offset="25%" stop-color="#EE7B6F" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#EE7B6F" stop-opacity="1.0"/>
      <stop offset="85%" stop-color="#9B7ED8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9B7ED8" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="36" y="36" width="328" height="328" rx="36" fill="#FAFBFC" stroke="#EDEEF0" stroke-width="1.5" filter="url(#shadow)"/>

  <g transform="translate(200,215)">

    <!-- ═══════ z-order layer 1: 最高的珊瑚柱（曲线从它后面穿过）═══════ -->
    <g transform="translate(32,0)">
      <polygon points="0,-130 18,-140 50,-140 32,-130" fill="url(#t3)"/>
      <polygon points="0,-130 32,-130 32,-50 0,-50" fill="url(#l3)"/>
      <polygon points="32,-130 50,-140 50,-60 32,-50" fill="url(#r3)"/>
    </g>

    <!-- ═══════ z-order layer 2: A 字贝塞尔曲线 ═══════ -->
    <path d="M -136,38 C -100,8 -30,-85 60,-120 C 90,-130 120,-108 136,-62"
          fill="none" stroke="url(#curveGrad)" stroke-width="3.5"
          stroke-linecap="round" filter="url(#glow)"/>

    <!-- 曲线两端的小圆点 -->
    <circle cx="-136" cy="38" r="3" fill="#5B8DE0" opacity="0.4"/>
    <circle cx="136" cy="-62" r="3" fill="#9B7ED8" opacity="0.4"/>

    <!-- ═══════ z-order layer 3: 其余柱体（在曲线前面）═══════ -->
    <!-- 柱 1 蓝色 -->
    <g transform="translate(-120,0)">
      <polygon points="0,-40 18,-50 50,-50 32,-40" fill="url(#t1)"/>
      <polygon points="0,-40 32,-40 32,40 0,40" fill="url(#l1)"/>
      <polygon points="32,-40 50,-50 50,-10 32,40" fill="url(#r1)"/>
    </g>
    <!-- 柱 2 绿色 -->
    <g transform="translate(-44,0)">
      <polygon points="0,-80 18,-90 50,-90 32,-80" fill="url(#t2)"/>
      <polygon points="0,-80 32,-80 32,0 0,0" fill="url(#l2)"/>
      <polygon points="32,-80 50,-90 50,-10 32,0" fill="url(#r2)"/>
    </g>
    <!-- 柱 4 紫色 -->
    <g transform="translate(108,0)">
      <polygon points="0,-100 18,-110 50,-110 32,-100" fill="url(#t4)"/>
      <polygon points="0,-100 32,-100 32,-20 0,-20" fill="url(#l4)"/>
      <polygon points="32,-100 50,-110 50,-30 32,-20" fill="url(#r4)"/>
    </g>
  </g>

  <text x="200" y="378" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="30" font-weight="700" fill="#1A1A1A" letter-spacing="2">anyviz</text>
</svg>
