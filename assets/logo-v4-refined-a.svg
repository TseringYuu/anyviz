<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- 顶面高亮 / 左侧深 / 右侧中间 — 精炼三面光 -->
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9DC4FF"/><stop offset="100%" stop-color="#5B8DE0"/></linearGradient>
    <linearGradient id="l1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4265B5"/><stop offset="100%" stop-color="#2E4990"/></linearGradient>
    <linearGradient id="r1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6B9EE8"/><stop offset="100%" stop-color="#4A7ACC"/></linearGradient>

    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8EE0A8"/><stop offset="100%" stop-color="#4CB880"/></linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#36955E"/><stop offset="100%" stop-color="#256F43"/></linearGradient>
    <linearGradient id="r2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5DC88C"/><stop offset="100%" stop-color="#3DA36B"/></linearGradient>

    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB8AD"/><stop offset="100%" stop-color="#EE7B6F"/></linearGradient>
    <linearGradient id="l3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CC5A4F"/><stop offset="100%" stop-color="#A84036"/></linearGradient>
    <linearGradient id="r3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F08D82"/><stop offset="100%" stop-color="#D96458"/></linearGradient>

    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CCB8F0"/><stop offset="100%" stop-color="#9B7ED8"/></linearGradient>
    <linearGradient id="l4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7055B8"/><stop offset="100%" stop-color="#573E96"/></linearGradient>
    <linearGradient id="r4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#AA8EE0"/><stop offset="100%" stop-color="#7E5FC4"/></linearGradient>

    <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B8DE0" stop-opacity="0.0"/>
      <stop offset="20%" stop-color="#EE7B6F" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#EE7B6F" stop-opacity="1.0"/>
      <stop offset="80%" stop-color="#9B7ED8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9B7ED8" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="-2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.04"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="36" y="36" width="328" height="328" rx="36" fill="#FAFBFC" stroke="#EDEEF0" stroke-width="1.5" filter="url(#shadow)"/>

  <g transform="translate(200,225)" filter="url(#barShadow)">

    <!-- layer 1: 珊瑚最高柱（曲线从它后面穿过）-->
    <g transform="translate(32,0)">
      <polygon points="0,-140 18,-150 50,-150 32,-140" fill="url(#t3)"/>
      <polygon points="0,-140 32,-140 32,-60 0,-60" fill="url(#l3)"/>
      <polygon points="32,-140 50,-150 50,-70 32,-60" fill="url(#r3)"/>
    </g>

    <!-- layer 2: A 字贝塞尔曲线 -->
    <path d="M -136,32 C -100,0 -45,-85 50,-120 C 98,-132 128,-105 136,-58"
          fill="none" stroke="url(#curveGrad)" stroke-width="3.8"
          stroke-linecap="round" filter="url(#glow)"/>

    <!-- 端点装饰 -->
    <circle cx="-136" cy="32" r="3.5" fill="#5B8DE0" opacity="0.35"/>
    <circle cx="136" cy="-58" r="3.5" fill="#9B7ED8" opacity="0.35"/>

    <!-- layer 3: 其余柱体（曲线前面）-->
    <g transform="translate(-120,0)">
      <polygon points="0,-44 18,-54 50,-54 32,-44" fill="url(#t1)"/>
      <polygon points="0,-44 32,-44 32,36 0,36" fill="url(#l1)"/>
      <polygon points="32,-44 50,-54 50,-10 32,36" fill="url(#r1)"/>
    </g>
    <g transform="translate(-44,0)">
      <polygon points="0,-85 18,-95 50,-95 32,-85" fill="url(#t2)"/>
      <polygon points="0,-85 32,-85 32,-5 0,-5" fill="url(#l2)"/>
      <polygon points="32,-85 50,-95 50,-15 32,-5" fill="url(#r2)"/>
    </g>
    <g transform="translate(108,0)">
      <polygon points="0,-105 18,-115 50,-115 32,-105" fill="url(#t4)"/>
      <polygon points="0,-105 32,-105 32,-25 0,-25" fill="url(#l4)"/>
      <polygon points="32,-105 50,-115 50,-35 32,-25" fill="url(#r4)"/>
    </g>
  </g>

  <text x="200" y="378" text-anchor="middle"
        font-family="'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="30" font-weight="700" fill="#1A1A1A" letter-spacing="2">AnyVis</text>
</svg>
