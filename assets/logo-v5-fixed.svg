<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- 顶面高亮 / 正面 / 侧面 — 精炼三面光 -->
    <linearGradient id="top1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9DC4FF"/><stop offset="100%" stop-color="#5B8DE0"/></linearGradient>
    <linearGradient id="frt1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4265B5"/><stop offset="100%" stop-color="#2E4990"/></linearGradient>
    <linearGradient id="sid1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6B9EE8"/><stop offset="100%" stop-color="#4A7ACC"/></linearGradient>

    <linearGradient id="top2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8EE0A8"/><stop offset="100%" stop-color="#4CB880"/></linearGradient>
    <linearGradient id="frt2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#36955E"/><stop offset="100%" stop-color="#256F43"/></linearGradient>
    <linearGradient id="sid2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5DC88C"/><stop offset="100%" stop-color="#3DA36B"/></linearGradient>

    <linearGradient id="top3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB8AD"/><stop offset="100%" stop-color="#EE7B6F"/></linearGradient>
    <linearGradient id="frt3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CC5A4F"/><stop offset="100%" stop-color="#A84036"/></linearGradient>
    <linearGradient id="sid3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F08D82"/><stop offset="100%" stop-color="#D96458"/></linearGradient>

    <linearGradient id="top4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CCB8F0"/><stop offset="100%" stop-color="#9B7ED8"/></linearGradient>
    <linearGradient id="frt4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7055B8"/><stop offset="100%" stop-color="#573E96"/></linearGradient>
    <linearGradient id="sid4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#AA8EE0"/><stop offset="100%" stop-color="#7E5FC4"/></linearGradient>

    <!-- 微曲斜向上的趋势线 -->
    <linearGradient id="curveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B8DE0" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#EE7B6F" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#EE7B6F" stop-opacity="1.0"/>
      <stop offset="100%" stop-color="#9B7ED8" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="barShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="-2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.05"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 容器 -->
  <rect x="36" y="36" width="328" height="328" rx="36" fill="#FAFBFC" stroke="#EDEEF0" stroke-width="1.5" filter="url(#shadow)"/>

  <!--
    等距 3D 柱体组
    所有柱体共享同一地面（y=0），仅高度不同
    正面: 0,-H 32,-H 32,0 0,0
    侧面: 32,-H 50,-(H+10) 50,-10 32,0
    顶面: 0,-H 18,-(H+10) 50,-(H+10) 32,-H
  -->
  <g transform="translate(200,215)" filter="url(#barShadow)">

    <!-- 柱 1 蓝色 H=55 -->
    <g transform="translate(-120,0)">
      <polygon points="0,-55 18,-65 50,-65 32,-55" fill="url(#top1)"/>
      <polygon points="0,-55 32,-55 32,0 0,0" fill="url(#frt1)"/>
      <polygon points="32,-55 50,-65 50,-10 32,0" fill="url(#sid1)"/>
    </g>

    <!-- 柱 2 绿色 H=100 -->
    <g transform="translate(-44,0)">
      <polygon points="0,-100 18,-110 50,-110 32,-100" fill="url(#top2)"/>
      <polygon points="0,-100 32,-100 32,0 0,0" fill="url(#frt2)"/>
      <polygon points="32,-100 50,-110 50,-10 32,0" fill="url(#sid2)"/>
    </g>

    <!-- 柱 3 珊瑚 H=160 -->
    <g transform="translate(32,0)">
      <polygon points="0,-160 18,-170 50,-170 32,-160" fill="url(#top3)"/>
      <polygon points="0,-160 32,-160 32,0 0,0" fill="url(#frt3)"/>
      <polygon points="32,-160 50,-170 50,-10 32,0" fill="url(#sid3)"/>
    </g>

    <!-- 柱 4 紫色 H=120 -->
    <g transform="translate(108,0)">
      <polygon points="0,-120 18,-130 50,-130 32,-120" fill="url(#top4)"/>
      <polygon points="0,-120 32,-120 32,0 0,0" fill="url(#frt4)"/>
      <polygon points="32,-120 50,-130 50,-10 32,0" fill="url(#sid4)"/>
    </g>

    <!-- 微曲趋势线：C 控制点仅做轻微弯曲，斜向上穿过画面中部 -->
    <path d="M -130,35 C -60,-20 60,-155 140,-95"
          fill="none" stroke="url(#curveGrad)" stroke-width="3"
          stroke-linecap="round" filter="url(#glow)"/>

    <!-- 端点 -->
    <circle cx="-130" cy="35" r="2.5" fill="#5B8DE0" opacity="0.5"/>
    <circle cx="140" cy="-95" r="2.5" fill="#9B7ED8" opacity="0.5"/>
  </g>
</svg>
