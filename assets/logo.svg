<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C72B0"/>
      <stop offset="100%" stop-color="#3A5A8C"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#55A868"/>
      <stop offset="100%" stop-color="#3D8A4E"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C44E52"/>
      <stop offset="100%" stop-color="#A03A3E"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8172B2"/>
      <stop offset="100%" stop-color="#655899"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCB974"/>
      <stop offset="100%" stop-color="#B0A05A"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方框 -->
  <rect x="20" y="20" width="360" height="360" rx="48" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- 图表区网格线 -->
  <line x1="60" y1="300" x2="340" y2="300" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="60" y1="260" x2="340" y2="260" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="60" y1="220" x2="340" y2="220" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="60" y1="180" x2="340" y2="180" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>
  <line x1="60" y1="140" x2="340" y2="140" stroke="#E8E8E8" stroke-width="0.75" stroke-dasharray="3 3"/>

  <!-- 柱状图 - 五根柱子，从 categorical 色板 -->
  <rect x="80"  y="180" width="32" height="120" rx="0" fill="url(#bar1)"/>
  <rect x="130" y="120" width="32" height="180" rx="0" fill="url(#bar2)"/>
  <rect x="180" y="160" width="32" height="140" rx="0" fill="url(#bar3)"/>
  <rect x="230" y="80"  width="32" height="220" rx="0" fill="url(#bar4)"/>
  <rect x="280" y="140" width="32" height="160" rx="0" fill="url(#bar5)"/>

  <!-- 基准轴线 -->
  <line x1="60" y1="300" x2="340" y2="300" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 折线趋势（叠加在柱状图上方） -->
  <polyline points="96,170 146,110 196,150 246,70 296,130"
            fill="none" stroke="#C44E52" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="96"  cy="170" r="4.5" fill="#C44E52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="146" cy="110" r="4.5" fill="#C44E52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="196" cy="150" r="4.5" fill="#C44E52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="246" cy="70"  r="4.5" fill="#C44E52" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="296" cy="130" r="4.5" fill="#C44E52" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- 品牌名 AnyVis -->
  <text x="200" y="370" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" fill="#1A1A1A"
        letter-spacing="1.5">AnyVis</text>
</svg>
