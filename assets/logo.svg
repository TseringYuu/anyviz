<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9DC4FF"/><stop offset="100%" stop-color="#5B8DE0"/></linearGradient>
    <linearGradient id="f1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4265B5"/><stop offset="100%" stop-color="#2E4990"/></linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6B9EE8"/><stop offset="100%" stop-color="#4A7ACC"/></linearGradient>

    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8EE0A8"/><stop offset="100%" stop-color="#4CB880"/></linearGradient>
    <linearGradient id="f2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#36955E"/><stop offset="100%" stop-color="#256F43"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5DC88C"/><stop offset="100%" stop-color="#3DA36B"/></linearGradient>

    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFB8AD"/><stop offset="100%" stop-color="#EE7B6F"/></linearGradient>
    <linearGradient id="f3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CC5A4F"/><stop offset="100%" stop-color="#A84036"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F08D82"/><stop offset="100%" stop-color="#D96458"/></linearGradient>

    <linearGradient id="t4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CCB8F0"/><stop offset="100%" stop-color="#9B7ED8"/></linearGradient>
    <linearGradient id="f4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7055B8"/><stop offset="100%" stop-color="#573E96"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#AA8EE0"/><stop offset="100%" stop-color="#7E5FC4"/></linearGradient>

    <linearGradient id="axisGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CCCCCC" stop-opacity="0"/>
      <stop offset="15%" stop-color="#CCCCCC" stop-opacity="1"/>
      <stop offset="85%" stop-color="#CCCCCC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#CCCCCC" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="barShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="-3" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect x="36" y="36" width="328" height="328" rx="36" fill="#FAFBFC" stroke="#EDEEF0" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- 极简 X 轴：渐变淡入淡出，无线条感 -->
  <line x1="80" y1="256" x2="320" y2="256" stroke="url(#axisGrad)" stroke-width="1" stroke-linecap="round"/>

  <!-- 等距 3D 柱体，位置/高度与 v1 一致，stroke-width 6 + round join = 可见圆角 -->
  <g transform="translate(200,220)" filter="url(#barShadow)">

    <!-- 柱 1 蓝 H=40 前后-40 地40  侧后底 -50+80=30（已修正）-->
    <g transform="translate(-120,0)">
      <polygon points="0,-40 18,-50 50,-50 32,-40" fill="url(#t1)"
               stroke="#7AADFF" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="0,-40 32,-40 32,40 0,40" fill="url(#f1)"
               stroke="#3556A3" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="32,-40 50,-50 50,30 32,40" fill="url(#s1)"
               stroke="#5B8DE0" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- 柱 2 绿 H=80 前后-80 地0  侧后底 -90+80=-10 -->
    <g transform="translate(-44,0)">
      <polygon points="0,-80 18,-90 50,-90 32,-80" fill="url(#t2)"
               stroke="#7AD694" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="0,-80 32,-80 32,0 0,0" fill="url(#f2)"
               stroke="#2A7A49" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="32,-80 50,-90 50,-10 32,0" fill="url(#s2)"
               stroke="#4CB880" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- 柱 3 珊瑚 地-50  侧后底 -60（v1 原值）-->
    <g transform="translate(32,0)">
      <polygon points="0,-130 18,-140 50,-140 32,-130" fill="url(#t3)"
               stroke="#FFA599" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="0,-130 32,-130 32,-50 0,-50" fill="url(#f3)"
               stroke="#B84039" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="32,-130 50,-140 50,-60 32,-50" fill="url(#s3)"
               stroke="#EE7B6F" stroke-width="6" stroke-linejoin="round"/>
    </g>

    <!-- 柱 4 紫 地-20  侧后底 -30（v1 原值）-->
    <g transform="translate(108,0)">
      <polygon points="0,-100 18,-110 50,-110 32,-100" fill="url(#t4)"
               stroke="#C8B0F0" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="0,-100 32,-100 32,-20 0,-20" fill="url(#f4)"
               stroke="#5D419E" stroke-width="6" stroke-linejoin="round"/>
      <polygon points="32,-100 50,-110 50,-30 32,-20" fill="url(#s4)"
               stroke="#9B7ED8" stroke-width="6" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
