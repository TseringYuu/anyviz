<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnyVis · Theme Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    :root { color-scheme: light; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#f5f6f8; color:#1a1a1a;
      font-family:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif;
    }
    header {
      background:#fff; border-bottom:1px solid #e8eaed;
      padding:20px 40px; display:flex; align-items:center; gap:14px;
    }
    header svg { width:32px; height:32px; }
    header h1 { font-size:20px; font-weight:700; }
    header .badge { font-size:11px; color:#9ca3af; margin-left:auto; }
    main { max-width:1280px; margin:0 auto; padding:32px 40px; }
    section { margin-bottom:40px; }
    .sec-title { font-size:15px; font-weight:600; color:#5a5a5a; margin-bottom:16px; letter-spacing:0.3px; }

    .theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .theme-card {
      background:#fff; border-radius:12px; border:1px solid #eee;
      overflow:hidden; transition:box-shadow .2s;
    }
    .theme-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.06); }
    .theme-card .head {
      padding:14px 16px 10px; font-size:13px; font-weight:600;
      display:flex; justify-content:space-between; align-items:center;
    }
    .theme-card .head .tag { font-size:10px; padding:2px 8px; border-radius:10px; background:#f0f0f0; color:#888; }
    .theme-card .swatches { display:flex; padding:0 16px 14px; gap:3px; }
    .theme-card .swatches span {
      width:22px; height:22px; border-radius:4px; flex-shrink:0;
    }
    .theme-card .meta { padding:0 16px 14px; font-size:11px; color:#999; line-height:1.6; }

    .chart-grid { display:grid; gap:20px; }
    .chart-grid.cols2 { grid-template-columns:1fr 1fr; }
    .chart-grid.cols3 { grid-template-columns:1fr 1fr 1fr; }
    .card {
      background:#fff; border-radius:12px; border:1px solid #eee; overflow:hidden;
    }
    .card .card-head { padding:16px 20px 0; font-size:13px; font-weight:600; color:#1a1a1a; }
    .card .chart { width:100%; height:340px; }

    .dark-section { background:#0f1923; border-radius:14px; padding:28px; margin-bottom:40px; }
    .dark-section .sec-title { color:#889aaa; }

    footer { text-align:center; padding:28px; font-size:11px; color:#9ca3af; }
  </style>
</head>
<body>

<header>
  <svg viewBox="0 0 128 128" fill="none"><rect x="4" y="4" width="120" height="120" rx="16" fill="#fafafa"/><rect x="24" y="60" width="12" height="48" fill="#5B7FBD" rx="2"/><rect x="42" y="40" width="12" height="68" fill="#6AA66A" rx="2"/><rect x="60" y="52" width="12" height="56" fill="#D4756B" rx="2"/><rect x="78" y="28" width="12" height="80" fill="#8B7DB8" rx="2"/><rect x="96" y="44" width="12" height="64" fill="#C4A24E" rx="2"/><line x1="18" y1="108" x2="110" y2="108" stroke="#ccc" stroke-width="0.8"/><polyline points="30,52 48,36 66,44 84,20 102,38" fill="none" stroke="#D4756B" stroke-width="1.8" stroke-linecap="round"/><circle cx="30" cy="52" r="3" fill="#D4756B" stroke="#fff" stroke-width="1.5"/><circle cx="48" cy="36" r="3" fill="#D4756B" stroke="#fff" stroke-width="1.5"/><circle cx="66" cy="44" r="3" fill="#D4756B" stroke="#fff" stroke-width="1.5"/><circle cx="84" cy="20" r="3" fill="#D4756B" stroke="#fff" stroke-width="1.5"/><circle cx="102" cy="38" r="3" fill="#D4756B" stroke="#fff" stroke-width="1.5"/></svg>
  <h1>AnyVis</h1>
  <span class="badge">4 套主题 · 场景自适应</span>
</header>

<main>

  <!-- 主题色板展示 -->
  <section>
    <div class="sec-title">内置配色主题</div>
    <div class="theme-grid" id="themes"></div>
  </section>

  <!-- Analytics vs Modern 对比 -->
  <section>
    <div class="sec-title">Analytics 报告风 vs Modern 现代风</div>
    <div class="chart-grid cols2">
      <div class="card">
        <div class="card-head">Analytics · 沉稳专业</div>
        <div id="c-analytics" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-head">Modern · 明快现代</div>
        <div id="c-modern" class="chart"></div>
      </div>
    </div>
  </section>

  <!-- 三图一致性 + 高级设计 -->
  <section>
    <div class="sec-title">升级设计细节 · 圆角 / 平滑 / 白描边 / 呼吸感</div>
    <div class="chart-grid cols3">
      <div class="card">
        <div class="card-head">收入趋势（平滑折线）</div>
        <div id="c-line" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-head">品类销售（圆角柱图）</div>
        <div id="c-bar" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-head">投入产出（描边散点）</div>
        <div id="c-scatter" class="chart"></div>
      </div>
    </div>
  </section>

  <!-- 深色 Dashboard 主题 -->
  <div class="dark-section">
    <div class="sec-title">Dashboard · 数据大屏 / 深色背景</div>
    <div class="chart-grid cols2">
      <div class="card" style="background:#0f1923;border-color:#1e3040;">
        <div class="card-head" style="color:#e8edf2">实时监控</div>
        <div id="c-dash-line" class="chart"></div>
      </div>
      <div class="card" style="background:#0f1923;border-color:#1e3040;">
        <div class="card-head" style="color:#e8edf2">流量来源</div>
        <div id="c-dash-donut" class="chart"></div>
      </div>
    </div>
  </div>

</main>

<footer>AnyVis · MIT License · 场景自适应可视化主题引擎</footer>

<script>
  // ═══════ 四套色板 ═══════
  const themes = {
    analytics: {
      name:'Analytics', tag:'报告·PPT',
      colors:['#5B7FBD','#6AA66A','#D4756B','#8B7DB8','#C4A24E','#6FB3C4','#9E9E9E','#E8963E','#7CB342','#D47FA6'],
      desc:'沉稳专业，中低饱和度，长时间阅读不疲劳',
      bg:'#fff', text:'#1a1a1a', pageBg:'#f7f8fa', grid:'#eaeaec', axis:'#ccc'
    },
    dashboard: {
      name:'Dashboard', tag:'大屏·监控',
      colors:['#5E9CF3','#4DD9C1','#FF6B7A','#B388FF','#FFC048','#40C4FF','#8E99A4','#FF8A65','#69F0AE','#FF80AB'],
      desc:'高对比度，深色背景优化，发光质感',
      bg:'#0F1923', text:'#E8EDF2', pageBg:'#0A1119', grid:'#1A2A3A', axis:'#1E3040'
    },
    academic: {
      name:'Academic', tag:'论文·期刊',
      colors:['#333','#666','#999','#BBB','#DDD','#888','#AAA','#777','#555','#444'],
      desc:'灰度安全，极简克制，打印友好',
      bg:'#fff', text:'#000', pageBg:'#fff', grid:'#e8e8e8', axis:'#ccc'
    },
    modern: {
      name:'Modern', tag:'默认·通用',
      colors:['#5B8DE0','#4CB880','#EE7B6F','#9B7ED8','#E8B33F','#5CC0C8','#9CA3AF','#F09050','#A3C95A','#E87DB5'],
      desc:'色彩明快，圆角设计，网页和产品通用',
      bg:'#fff', text:'#1a1a1a', pageBg:'#fafbfc', grid:'#edeef0', axis:'#d5d8dc'
    }
  };

  // ═══════ 色板卡片 ═══════
  (function(){
    const el = document.getElementById('themes');
    el.innerHTML = Object.values(themes).map(t=>`
      <div class="theme-card">
        <div class="head">
          ${t.name} <span class="tag">${t.tag}</span>
        </div>
        <div class="swatches">${t.colors.slice(0,8).map(c=>`<span style="background:${c}"></span>`).join('')}</div>
        <div class="meta">${t.desc}</div>
      </div>
    `).join('');
  })();

  const FONT = "'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif";

  function makeBase(bg='#fff',text='#1a1a1a') {
    return {
      textStyle:{fontFamily:FONT,color:text},
      backgroundColor:bg,
      animation:true, animationDuration:600, animationEasing:'cubicOut'
    };
  }

  function makeGrid(top=52,right=28,bottom=44,left=50) {
    return {top,right,bottom,left,containLabel:false};
  }

  function tooltip(bg,text) {
    return {
      backgroundColor:bg||'#fff', borderColor:'#e0e0e0',
      textStyle:{fontSize:11,color:text||'#1a1a1a',fontFamily:FONT},
      extraCssText:'border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:8px 12px;'
    };
  }

  function axisCommon(color='#ccc',labelColor='#777') {
    return {
      axisLine:{lineStyle:{color,width:0.8}},
      axisTick:{show:true,length:4,lineStyle:{color,width:0.8}},
      axisLabel:{fontSize:10,color:labelColor,fontFamily:FONT,margin:8},
      splitLine:{show:true,lineStyle:{color:'#edeef0',width:0.5,type:'dashed'}}
    };
  }

  // ── Analytics vs Modern 对比 ──
  function makeCompareChart(domId,theme) {
    const t = themes[theme];
    const c = echarts.init(document.getElementById(domId));
    const m=['1月','2月','3月','4月','5月','6月','7月'];
    c.setOption({
      ...makeBase(t.bg,t.text),
      color:t.colors,
      grid:makeGrid(),
      tooltip:tooltip(t.bg,t.text),
      xAxis:{type:'category',data:m,...axisCommon(t.axis,t.text==='#E8EDF2'?'#889aaa':'#777')},
      yAxis:{type:'value',...axisCommon(t.axis,t.text==='#E8EDF2'?'#889aaa':'#777')},
      series:['产品A','产品B','产品C','产品D'].map((n,i)=>({
        name:n,type:'bar',
        data:[820,932,901,934,1290,1330,1320].map(v=>Math.round(v*(1-i*0.12))),
        barWidth:'55%',
        itemStyle:{borderRadius:[4,4,0,0],borderColor:'transparent',borderWidth:0}
      }))
    });
  }
  makeCompareChart('c-analytics','analytics');
  makeCompareChart('c-modern','modern');

  // ── 三图高级设计 ──
  const M = themes.modern;
  // 折线图
  (function(){
    const c = echarts.init(document.getElementById('c-line'));
    const m=['1月','2月','3月','4月','5月','6月','7月','8月'];
    c.setOption({
      ...makeBase(M.bg,M.text),
      color:[M.colors[0],M.colors[2]],
      grid:makeGrid(),
      tooltip:tooltip(),
      xAxis:{type:'category',data:m,...axisCommon(M.axis)},
      yAxis:{type:'value',...axisCommon(M.axis)},
      series:[
        {name:'收入',type:'line',data:[385,420,480,520,560,590,610,650],
         smooth:true,lineStyle:{width:2.2,cap:'round'},
         symbol:'circle',symbolSize:7,
         itemStyle:{borderColor:'#fff',borderWidth:2,color:M.colors[0]},
         areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
           {offset:0,color:M.colors[0]+'28'},{offset:1,color:M.colors[0]+'00'}
         ])}},
        {name:'利润',type:'line',data:[78,85,95,108,115,122,130,142],
         smooth:true,lineStyle:{width:2.2,cap:'round'},
         symbol:'circle',symbolSize:7,
         itemStyle:{borderColor:'#fff',borderWidth:2,color:M.colors[2]},
         areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
           {offset:0,color:M.colors[2]+'20'},{offset:1,color:M.colors[2]+'00'}
         ])}}
      ]
    });
  })();

  // 圆角柱状图
  (function(){
    const c = echarts.init(document.getElementById('c-bar'));
    const cats=['服装','数码','食品','家居','美妆'];
    c.setOption({
      ...makeBase(M.bg,M.text),
      color:M.colors,
      grid:{top:52,right:36,bottom:44,left:54},
      tooltip:tooltip(),
      xAxis:{type:'value',...axisCommon(M.axis)},
      yAxis:{type:'category',data:cats,inverse:true,...axisCommon(M.axis)},
      series:[{
        type:'bar',barWidth:'52%',
        data:[850,720,680,450,320].map((v,i)=>({value:v,itemStyle:{color:M.colors[i],borderRadius:[0,5,5,0]}})),
        label:{show:true,position:'right',fontSize:10,color:M.colors[5],fontFamily:FONT,fontWeight:500}
      }]
    });
  })();

  // 描边散点
  (function(){
    const c = echarts.init(document.getElementById('c-scatter'));
    function rng(min,max,n){return Array.from({length:n},()=>min+Math.random()*(max-min));}
    c.setOption({
      ...makeBase(M.bg,M.text),
      color:[M.colors[0],M.colors[3],M.colors[7]],
      grid:makeGrid(),
      tooltip:tooltip(),
      xAxis:{type:'value',name:'投入(万元)',nameTextStyle:{fontSize:11,color:'#5a5a5a',fontFamily:FONT},...axisCommon(M.axis)},
      yAxis:{type:'value',name:'产出(万元)',nameTextStyle:{fontSize:11,color:'#5a5a5a',fontFamily:FONT},...axisCommon(M.axis)},
      series:['A组','B组','C组'].map((n,i)=>({
        name:n,type:'scatter',
        data:rng(10,100,25).map((x,j)=>({value:[x,rng(8,80,25)[j]]})),
        symbolSize:10,itemStyle:{opacity:0.7,borderColor:'#fff',borderWidth:2}
      }))
    });
  })();

  // ── Dashboard 深色 ──
  const D = themes.dashboard;
  (function(){
    const c = echarts.init(document.getElementById('c-dash-line'));
    const h=['00:00','03:00','06:00','09:00','12:00','15:00','18:00','21:00'];
    c.setOption({
      ...makeBase('#0f1923','#e8edf2'),
      color:D.colors,
      grid:makeGrid(),
      tooltip:tooltip('#1a2a3a','#e8edf2'),
      xAxis:{type:'category',data:h,axisLine:{lineStyle:{color:'#1e3040',width:0.8}},axisTick:{show:false},axisLabel:{fontSize:10,color:'#889aaa',fontFamily:FONT,margin:8}},
      yAxis:{type:'value',splitLine:{lineStyle:{color:'#1a2a3a',width:0.5,type:'dashed'}},axisLabel:{fontSize:10,color:'#889aaa',fontFamily:FONT}},
      series:['API延迟','QPS'].map((n,i)=>({
        name:n,type:'line',
        data:i===0?[45,42,38,55,120,95,60,48]:[1200,1100,1050,1800,3200,2800,2100,1500],
        smooth:true,lineStyle:{width:2.5,cap:'round'},
        symbol:'circle',symbolSize:7,
        itemStyle:{borderColor:'#0f1923',borderWidth:2.5,color:D.colors[i]},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
          {offset:0,color:D.colors[i]+'30'},{offset:1,color:D.colors[i]+'00'}
        ])}
      })),
      legend:{data:['API延迟(ms)','QPS'],top:0,right:0,textStyle:{fontSize:10,color:'#889aaa',fontFamily:FONT}}
    });
  })();

  (function(){
    const c = echarts.init(document.getElementById('c-dash-donut'));
    c.setOption({
      ...makeBase('#0f1923','#e8edf2'),
      color:[D.colors[0],D.colors[3],D.colors[1],D.colors[4],D.colors[5]],
      tooltip:tooltip('#1a2a3a','#e8edf2'),
      legend:{bottom:0,textStyle:{fontSize:10,color:'#889aaa',fontFamily:FONT}},
      series:[{
        type:'pie',radius:['48%','72%'],center:['50%','48%'],
        label:{fontSize:10,color:'#889aaa',fontFamily:FONT,formatter:'{b}\n{d}%'},
        emphasis:{label:{fontSize:16,fontWeight:'bold'},itemStyle:{shadowBlur:20,shadowColor:'rgba(0,0,0,0.4)'}},
        data:[
          {name:'App',value:520},{name:'小程序',value:310},
          {name:'Web',value:220},{name:'H5',value:95},{name:'其他',value:55}
        ],
        itemStyle:{borderColor:'#0f1923',borderWidth:3}
      }]
    });
  })();

  // 响应式
  window.addEventListener('resize',()=>{
    document.querySelectorAll('.chart').forEach(el=>{
      const i=echarts.getInstanceByDom(el);
      if(i)i.resize();
    });
  });
</script>
</body>
</html>
